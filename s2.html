<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Симуляция раздачи призов</title>
<style>
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    padding: 30px; 
    background: #1e1e24; 
    color: #fff; 
  }
  .stats { 
    margin-bottom: 30px; 
    background: #2b2b36; 
    padding: 20px; 
    border-radius: 8px; 
  }
  .legend { 
    display: flex; 
    gap: 20px; 
    margin-bottom: 15px; 
  }
  .legend span { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    font-size: 14px; 
  }
  .dot { 
    width: 14px; 
    height: 14px; 
    border-radius: 3px; 
  }
  .btn {
    padding: 10px 20px; 
    cursor: pointer; 
    background: #3742fa; 
    color: white; 
    border: none; 
    border-radius: 6px;
    font-weight: 600;
  }
  .btn:hover { background: #535cfa; }
  
  .timeline { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 4px; 
    max-width: 1000px; 
    padding-top: 10px; 
  }
  
  /* Стили для самих круток */
  .draw { 
    width: 8px; 
    height: 24px; 
    border-radius: 2px; 
    transition: transform 0.1s;
  }
  .draw:hover {
    transform: scale(1.5);
  }
  .red { background: #ff4757; }
  .yellow { background: #ffa502; }
  .standard { background: #57606f; }
  
  /* Линии дедлайнов */
  .marker { 
    width: 2px; 
    background: #2ed573; 
    position: relative; 
    margin: 0 8px; 
  }
  .marker::after { 
    content: attr(data-label); 
    position: absolute; 
    top: -25px; 
    left: -40px; 
    font-size: 12px; 
    color: #2ed573; 
    white-space: nowrap; 
    font-weight: bold;
  }
</style>
</head>
<body>

<h2>Визуализация окна раздач (1000 юзеров)</h2>
<div class="stats">
  <div class="legend">
    <span><div class="dot red"></div> Красные (лимит до 250, всего 50 шт)</span>
    <span><div class="dot yellow"></div> Желтые (лимит до 750, всего 150 шт)</span>
    <span><div class="dot standard"></div> Стандартные (без лимита)</span>
  </div>
  <button class="btn" onclick="runSimulation()">Сгенерировать заново</button>
</div>

<div class="timeline" id="timeline"></div>

<script>
function runSimulation() {
  const TOTAL_USERS = 1000;
  const RED_LIMIT = 250;
  const YELLOW_LIMIT = 750;

  // Стартовые условия
  let prizes = { 
    red: 50, 
    yellow: 150, 
    standard: 800 
  };
  
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = ''; // Очищаем поле

  for (let currentDraw = 1; currentDraw <= TOTAL_USERS; currentDraw++) {
    let chosen = null;

    // 1. Красные призы
    if (currentDraw <= RED_LIMIT && prizes.red > 0) {
      let slotsLeft = RED_LIMIT - currentDraw + 1;
      let pRed = prizes.red / slotsLeft;
      if (pRed >= 1 || Math.random() < pRed) chosen = 'red';
    }

    // 2. Желтые призы
    if (!chosen && currentDraw <= YELLOW_LIMIT && prizes.yellow > 0) {
      let slotsLeft = YELLOW_LIMIT - currentDraw + 1;
      let pYellow = prizes.yellow / slotsLeft;
      if (pYellow >= 1 || Math.random() < pYellow) chosen = 'yellow';
    }

    // 3. Стандартные призы
    if (!chosen) {
      if (prizes.standard > 0) chosen = 'standard';
      else if (prizes.yellow > 0) chosen = 'yellow';
      else if (prizes.red > 0) chosen = 'red';
    }

    if (chosen) prizes[chosen]--;

    // Рендерим полоску
    const el = document.createElement('div');
    el.className = 'draw ' + (chosen || 'standard');
    el.title = `Ход: ${currentDraw} | Приз: ${chosen}`;
    timeline.appendChild(el);

    // Рендерим маркеры дедлайнов
    if (currentDraw === RED_LIMIT) {
      const marker = document.createElement('div');
      marker.className = 'marker';
      marker.setAttribute('data-label', 'Дедлайн 250');
      timeline.appendChild(marker);
    }
    if (currentDraw === YELLOW_LIMIT) {
      const marker = document.createElement('div');
      marker.className = 'marker';
      marker.setAttribute('data-label', 'Дедлайн 750');
      timeline.appendChild(marker);
    }
  }
}

// Запускаем сразу при открытии
runSimulation();
</script>
</body>
</html>
