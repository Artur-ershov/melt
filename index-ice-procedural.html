<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Растопи лёд — процедурный лёд</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
      @font-face {
        font-family: "Crocnew";
        src: url("CoFoWeather20240219-VF.ttf") format("truetype");
        font-weight: 100 900;
        font-stretch: 75% 125%;
        font-style: normal;
      }

      /* Стилизация полноэкранного интерфейса */
      #ice-app-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 99999;
        background: #0a0a0a;
        color: #fff;
        font-family: "Crocnew", sans-serif;
      }

      .fs-screen {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .auth-box {
        text-align: center;
        padding: 20px;
      }

      .ice-title {
        font-size: 36px;
        font-weight: 900;
        letter-spacing: 5px;
        margin-bottom: 10px;
        font-variation-settings: "wdth" 125;
      }

      .ice-subtitle {
        opacity: 0.5;
        font-size: 14px;
        margin-bottom: 30px;
      }

      #user-email-field {
        width: 280px;
        padding: 18px 25px;
        border-radius: 50px;
        border: 1px solid #333;
        background: #111;
        color: #fff;
        font-size: 16px;
        margin-bottom: 15px;
        outline: none;
      }

      #btn-start-ice {
        width: 280px;
        padding: 18px;
        border-radius: 50px;
        border: none;
        background: #fff;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      /* Оформление приза под льдом */
      #prize-underlayer {
        position: absolute;
        width: 100%;
        height: 100%;
        background: url("bg.svg") center center / cover no-repeat,
          radial-gradient(circle at center, #1e3a8a 0%, #000 100%);
        color: #555758;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .prize-container {
        text-align: center;
      }

      .prize-label {
        font-size: 12px;
        letter-spacing: 3px;
        opacity: 0;
        text-transform: uppercase;
        margin-bottom: 10px;
        filter: blur(10px);
        transform: scale(0.96);
      }

      .prize-rarity {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.7;
        margin-bottom: 6px;
      }

      #prize-content {
        opacity: 0;
        filter: blur(10px);
        transform: scale(0.96);
      }

      #prize-title {
        font-family: "Crocnew", sans-serif;
        font-style: normal;
        font-weight: 400;
        font-size: 72px;
        line-height: 1;
        font-stretch: 125%;
        font-variation-settings: "wdth" 125;
        text-align: center;
        text-transform: uppercase;
        color: #555758;
        letter-spacing: 0;
        margin: 6px 0;
      }

      #prize-nominal {
        font-size: 14px;
        opacity: 0.8;
        margin-top: 4px;
      }

      #prize-description {
        font-family: "Crocnew", sans-serif;
        font-weight: 500;
        font-style: normal;
        font-size: 48px;
        line-height: 1.12;
        letter-spacing: 0;
        text-align: center;
        opacity: 0.8;
        margin-top: 12px;
      }

      /* Канвас льда */
      #ice-canvas {
        position: absolute;
        top: 0;
        left: 0;
        touch-action: none;
        cursor: crosshair;
      }

      #game-instruction {
        position: absolute;
        bottom: 40px;
        width: 100%;
        display: flex;
        justify-content: center;
        pointer-events: none;
      }

      #progress-panel {
        pointer-events: auto;
        padding: 14px 20px 12px 20px;
        min-width: 280px;
        max-width: 360px;
        background: rgba(235, 239, 243, 0.4);
        box-shadow:
          inset 47.7368px -47.7368px 47.7368px rgba(165, 165, 165, 0.094),
          inset -47.7368px 47.7368px 47.7368px rgba(255, 255, 255, 0.094);
        backdrop-filter: blur(50px);
        border-radius: 16px;
        text-align: center;
        color: hsla(200, 2%, 34%, 1);
      }

      #progress-bar {
        position: relative;
        width: 100%;
        height: 6px;
        margin: 0 auto 6px auto;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.3);
        overflow: hidden;
      }

      #progress-bar-fill {
        height: 100%;
        width: 0;
        background: hsla(200, 2%, 34%, 1);
        border-radius: 999px;
        transform-origin: left center;
        transition: width 0.25s ease-out;
      }

      #progress-text {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: hsla(200, 2%, 34%, 1);
      }

      .reveal-zoom {
        animation: revealZoom 2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
      }

      @keyframes revealZoom {
        0% {
          opacity: 0;
          transform: scale(0.9);
          filter: blur(10px);
        }
        40% {
          opacity: 0.3;
          transform: scale(0.94);
          filter: blur(6px);
        }
        100% {
          opacity: 1;
          transform: scale(1);
          filter: blur(0);
        }
      }
    </style>
  </head>

  <body>
    <div id="ice-app-wrapper">
      <div id="screen-auth" class="fs-screen">
        <div class="auth-box">
          <h2 class="ice-title">РАСТОПИ ЛЕД</h2>
          <p class="ice-subtitle">Растопи лёд и узнай свой подарок</p>

          <div class="ice-form">
            <input
              type="email"
              id="user-email-field"
              placeholder="name@company.com"
            />
            <button id="btn-start-ice">НАЧАТЬ</button>
          </div>
        </div>
      </div>

      <div id="screen-game" class="fs-screen" style="display: none">
        <div id="prize-underlayer">
          <div class="prize-container">
            <p class="prize-label">Твой секретный приз:</p>

            <div id="prize-content">
              <span id="prize-rarity" class="prize-rarity"></span>
              <h1 id="prize-title"></h1>
              <div id="prize-nominal"></div>
              <p id="prize-description"></p>
            </div>
          </div>
        </div>

        <canvas id="ice-canvas"></canvas>

        <div id="game-instruction">
          <div id="progress-panel">
            <div id="progress-bar">
              <div id="progress-bar-fill"></div>
            </div>
            <div id="progress-text">Растопи лёд, чтобы увидеть приз</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        const PRIZE_API = "/api/prize";

        let finalPrize = "";
        let clearedPercent = 0;
        const REVEAL_PERCENT = 65;
        let lastProgressUpdate = 0;
        let isAutoMelting = false;

        $("#btn-start-ice").on("click", function () {
          const email = $("#user-email-field").val().trim().toLowerCase();

          if (!email || !email.includes("@")) {
            alert("Введите корректную почту");
            return;
          }

          // Сразу запрашиваем приз
          $.ajax({
            url: PRIZE_API,
            method: "POST",
            contentType: "application/json",
            dataType: "json",
            data: JSON.stringify({ email: email }),
            success: function (res) {
              let prize = null;

              if (res && res.status === "success") {
                if (res.prize && typeof res.prize === "object") {
                  prize = res.prize;
                } else if (typeof res.prize === "string") {
                  prize = { title: res.prize };
                } else if (typeof res === "string") {
                  prize = { title: res };
                }
              }

              if (prize) {
                finalPrize = prize.title || prize.description || "";

                $("#prize-title").text(prize.title || "");
                $("#prize-rarity").text(prize.rarity || "");

                if (prize.nominalRub) {
                  $("#prize-nominal").text(
                    "Номинал: " + prize.nominalRub + " ₽"
                  );
                } else {
                  $("#prize-nominal").text("");
                }

                $("#prize-description").text(prize.description || "");
              } else {
                finalPrize =
                  (res && res.message) || "Ошибка при получении приза";

                $("#prize-title").text(finalPrize);
                $("#prize-rarity").text("");
                $("#prize-nominal").text("");
                $("#prize-description").text("");
              }
            },
            error: function () {
              finalPrize = "Проверь таблицу!";

              $("#prize-title").text(finalPrize);
              $("#prize-rarity").text("");
              $("#prize-nominal").text("");
              $("#prize-description").text("");
            },
          });

          $("#screen-auth").fadeOut(400, function () {
            $("#screen-game").fadeIn(200);
            startIceGame();
          });
        });

        function startIceGame() {
          const canvas = document.getElementById("ice-canvas");
          const ctx = canvas.getContext("2d");
          const $prizeContent = $("#prize-content");
          const $prizeLabel = $(".prize-label");

          function drawIceBackground() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const width = canvas.width;
            const height = canvas.height;

            // Базовый сине-голубой градиент
            const baseGrad = ctx.createLinearGradient(0, 0, 0, height);
            baseGrad.addColorStop(0, "#e0f7ff");
            baseGrad.addColorStop(0.35, "#b5e4ff");
            baseGrad.addColorStop(0.7, "#78b6e6");
            baseGrad.addColorStop(1, "#1b4b6f");
            ctx.fillStyle = baseGrad;
            ctx.fillRect(0, 0, width, height);

            // Лёгкий шум инея
            const step = 4;
            const noiseDensity = 0.28;
            ctx.fillStyle = "rgba(255,255,255,0.06)";
            for (let y = 0; y < height; y += step) {
              for (let x = 0; x < width; x += step) {
                if (Math.random() < noiseDensity) {
                  ctx.fillRect(x, y, 1, 1);
                }
              }
            }

            // Крупные ледяные грани
            const facetCount = 40;
            for (let i = 0; i < facetCount; i++) {
              const cx = Math.random() * width;
              const cy = Math.random() * height;
              const r = 80 + Math.random() * 220;
              const angle = Math.random() * Math.PI * 2;

              ctx.save();
              ctx.translate(cx, cy);
              ctx.rotate(angle);

              const grd = ctx.createLinearGradient(-r, -r, r, r);
              grd.addColorStop(0, "rgba(255,255,255,0.35)");
              grd.addColorStop(0.4, "rgba(230,245,255,0.12)");
              grd.addColorStop(1, "rgba(15,76,107,0.5)");

              ctx.fillStyle = grd;
              ctx.beginPath();
              ctx.moveTo(-r, -r * 0.35);
              ctx.lineTo(-r * 0.3, -r);
              ctx.lineTo(r, -r * 0.15);
              ctx.lineTo(r * 0.4, r);
              ctx.lineTo(-r * 0.6, r * 0.8);
              ctx.closePath();
              ctx.fill();
              ctx.restore();
            }

            // Трещины
            ctx.lineWidth = 1.2;
            ctx.strokeStyle = "rgba(255,255,255,0.8)";
            ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.shadowBlur = 4;
            const crackCount = 22;

            for (let i = 0; i < crackCount; i++) {
              let x = Math.random() * width;
              let y = Math.random() * height;
              const segments = 14;
              let dir = Math.random() * Math.PI * 2;

              ctx.beginPath();
              ctx.moveTo(x, y);

              for (let s = 0; s < segments; s++) {
                const len = 20 + Math.random() * 40;
                dir += (Math.random() - 0.5) * 0.9;
                x += Math.cos(dir) * len;
                y += Math.sin(dir) * len;
                ctx.lineTo(x, y);
              }

              ctx.stroke();
            }

            ctx.shadowBlur = 0;

            // Эффект заморозки по краям (виньетка)
            const centerX = width / 2;
            const centerY = height / 2;
            const maxR = Math.max(width, height);
            const vignette = ctx.createRadialGradient(
              centerX,
              centerY,
              maxR * 0.1,
              centerX,
              centerY,
              maxR * 0.8
            );
            vignette.addColorStop(0, "rgba(255,255,255,0)");
            vignette.addColorStop(1, "rgba(0,16,32,0.7)");

            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, width, height);
          }

          // Рисуем лёд один раз при старте
          drawIceBackground();

          function updateProgress() {
            const now = Date.now();
            if (now - lastProgressUpdate < 150) return;
            lastProgressUpdate = now;

            const width = canvas.width;
            const height = canvas.height;
            if (!width || !height) return;

            try {
              const imgData = ctx.getImageData(0, 0, width, height);
              const data = imgData.data;
              let opaqueCount = 0;

              for (let i = 3; i < data.length; i += 4) {
                if (data[i] > 0) opaqueCount++;
              }

              const totalPixels = width * height;
              const clearedPixels = totalPixels - opaqueCount;
              clearedPercent = (clearedPixels / totalPixels) * 100;
              if (clearedPercent < 0) clearedPercent = 0;
              if (clearedPercent > 100) clearedPercent = 100;

              $("#progress-bar-fill").css("width", clearedPercent + "%");
              $("#progress-text").text(
                "Растоплено: " + Math.round(clearedPercent) + "%"
              );
            } catch (err) {
              // Если getImageData недоступен (CORS и т.п.), прогресс не обновляем
            }
          }

          function getCoords(e) {
            const event = e.originalEvent || e;

            if (event.touches && event.touches.length > 0) {
              return {
                x: event.touches[0].clientX,
                y: event.touches[0].clientY,
              };
            }

            return { x: e.clientX, y: e.clientY };
          }

          function startAutoMelt() {
            if (isAutoMelting) return;
            isAutoMelting = true;

            const interval = setInterval(function () {
              // Несколько "мазков" за тик, чтобы таяло плавно, но быстро
              for (let i = 0; i < 10; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;

                ctx.globalCompositeOperation = "destination-out";
                const radius = 80;
                const gradient = ctx.createRadialGradient(
                  x,
                  y,
                  0,
                  x,
                  y,
                  radius
                );
                gradient.addColorStop(0, "rgba(0,0,0,0.8)");
                gradient.addColorStop(1, "rgba(0,0,0,0)");

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
              }

              updateProgress();

              if (clearedPercent >= 99) {
                clearInterval(interval);
              }
            }, 40);
          }

          function scratch(e) {
            const coords = getCoords(e);
            if (!coords.x && coords.x !== 0) return;

            ctx.globalCompositeOperation = "destination-out";

            const radius = 80;
            const gradient = ctx.createRadialGradient(
              coords.x,
              coords.y,
              0,
              coords.x,
              coords.y,
              radius
            );
            gradient.addColorStop(0, "rgba(0,0,0,0.8)");
            gradient.addColorStop(1, "rgba(0,0,0,0)");

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(coords.x, coords.y, radius, 0, Math.PI * 2);
            ctx.fill();

            updateProgress();

            if (
              finalPrize &&
              clearedPercent >= REVEAL_PERCENT &&
              !$prizeContent.hasClass("reveal-zoom")
            ) {
              $prizeLabel.addClass("reveal-zoom");
              $prizeContent.addClass("reveal-zoom");
            }

            if (clearedPercent >= REVEAL_PERCENT) {
              startAutoMelt();
            }
          }

          canvas.addEventListener("mousemove", scratch);

          canvas.addEventListener(
            "touchmove",
            function (e) {
              const event = e.originalEvent || e;
              if (event.touches && event.touches.length > 0) {
                scratch(e);
              }
              e.preventDefault();
            },
            { passive: false }
          );
        }
      });
    </script>
  </body>
</html>
